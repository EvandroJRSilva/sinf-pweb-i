<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <title>Média 26</title>
</head>
<body>
  <ul id="lista">
    <li><button id="1">Botão 1</button></li>
    <li><button id="2">Botão 2</button></li>
    <li><button id="3">Botão 3</button></li>
    <li><button id="4">Botão 4</button></li>
    <li><button id="5">Botão 5</button></li>
    <li><button id="6">Botão 6</button></li>
    <li><button id="7">Botão 7</button></li>
    <li><button id="8">Botão 8</button></li>
    <li><button id="9">Botão 9</button></li>
    <li><button id="10">Botão 10</button></li>
  </ul>

  <script>
    const lista = document.getElementById("lista");
    console.log(lista.childNodes.length)

    lista.addEventListener("click", (event) => {
        const botaoClicado = document.getElementById(event.target.id)
        lista.removeChild(botaoClicado.parentNode);
    })
  </script>
</body>
</html>
